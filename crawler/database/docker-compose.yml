version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: instagram_mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: PASSWORD
      MYSQL_DATABASE: INSTAGRAM_DATA
      MYSQL_USER: USERNAME
      MYSQL_PASSWORD: PASSWORD
    ports:
      - "3306:3306" 
    volumes:
      - db_data:/var/lib/mysql 
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
